<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 620" role="img" aria-labelledby="title desc">
  <title id="title">Quality and benchmark workflow</title>
  <desc id="desc">Model selection flows through compression, quality evaluation, benchmark planning, GPU measurement, reports, and promotion decision.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155" />
    </marker>
    <style>
      text { font-family: Inter, Arial, sans-serif; fill: #172033; }
      .title { font-size: 30px; font-weight: 700; }
      .label { font-size: 17px; font-weight: 700; }
      .small { font-size: 13px; }
      .box { fill: #ffffff; stroke: #64748b; stroke-width: 2; rx: 8; }
      .plan { fill: #edf2ff; stroke: #4c63b6; }
      .run { fill: #eef7f2; stroke: #2f7d6d; }
      .gate { fill: #fff7e6; stroke: #b7791f; }
      .fail { fill: #fff1f2; stroke: #be123c; }
      .edge { stroke: #334155; stroke-width: 2.4; marker-end: url(#arrow); fill: none; }
    </style>
  </defs>
  <rect width="1120" height="620" fill="#f8fafc" />
  <text class="title" x="48" y="58">Compression Validation Flow</text>
  <text class="small" x="48" y="88">Use estimates for planning, measured outputs for promotion decisions.</text>

  <rect class="box plan" x="56" y="160" width="190" height="90" />
  <text class="label" x="91" y="194">Choose Model</text>
  <text class="small" x="82" y="221">preset or HF config</text>

  <rect class="box plan" x="306" y="160" width="190" height="90" />
  <text class="label" x="347" y="194">Plan Memory</text>
  <text class="small" x="333" y="221">weights, KV cache, GPU</text>

  <rect class="box run" x="556" y="160" width="190" height="90" />
  <text class="label" x="608" y="194">Quantize</text>
  <text class="small" x="590" y="221">recipe or executable path</text>

  <rect class="box gate" x="806" y="160" width="230" height="90" />
  <text class="label" x="865" y="194">Quality Gate</text>
  <text class="small" x="837" y="221">generation, PPL, task, context</text>

  <rect class="box plan" x="306" y="365" width="190" height="90" />
  <text class="label" x="344" y="399">Bench Plan</text>
  <text class="small" x="331" y="426">serve and load commands</text>

  <rect class="box run" x="556" y="365" width="190" height="90" />
  <text class="label" x="599" y="399">GPU Run</text>
  <text class="small" x="580" y="426">target CUDA runtime</text>

  <rect class="box gate" x="806" y="365" width="230" height="90" />
  <text class="label" x="868" y="399">Reports</text>
  <text class="small" x="844" y="426">JSON plus HTML with SVG charts</text>

  <rect class="box run" x="806" y="500" width="230" height="64" />
  <text class="label" x="842" y="538">Promote or Iterate</text>

  <rect class="box fail" x="56" y="365" width="190" height="90" />
  <text class="label" x="96" y="399">Revise Inputs</text>
  <text class="small" x="85" y="426">calibration, scheme, model</text>

  <path class="edge" d="M 246 205 L 300 205" />
  <path class="edge" d="M 496 205 L 550 205" />
  <path class="edge" d="M 746 205 L 800 205" />
  <path class="edge" d="M 921 250 L 921 359" />
  <path class="edge" d="M 496 410 L 550 410" />
  <path class="edge" d="M 746 410 L 800 410" />
  <path class="edge" d="M 921 455 L 921 494" />
  <path class="edge" d="M 401 250 L 401 359" />
  <path class="edge" d="M 806 205 C 690 110 200 104 151 154" />
  <path class="edge" d="M 806 410 C 590 545 275 520 151 456" />
</svg>