<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 660" role="img" aria-labelledby="title desc">
  <title id="title">Model compression demo module architecture</title>
  <desc id="desc">CLI dispatch connects catalog, model specs, planner, recipes, benchmark planning, evaluations, GPU benchmarks, and reports.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155" />
    </marker>
    <style>
      text { font-family: Inter, Arial, sans-serif; fill: #172033; }
      .title { font-size: 30px; font-weight: 700; }
      .label { font-size: 18px; font-weight: 700; }
      .small { font-size: 14px; }
      .box { fill: #ffffff; stroke: #64748b; stroke-width: 2; rx: 8; }
      .core { fill: #eef7f2; stroke: #2f7d6d; }
      .exec { fill: #fff7e6; stroke: #b7791f; }
      .data { fill: #edf2ff; stroke: #4c63b6; }
      .edge { stroke: #334155; stroke-width: 2.4; marker-end: url(#arrow); fill: none; }
      .note { fill: #f8fafc; stroke: #cbd5e1; }
    </style>
  </defs>
  <rect width="1120" height="660" fill="#f8fafc" />
  <text class="title" x="48" y="58">Model Compression Demo Architecture</text>
  <text class="small" x="48" y="88">Dependency-light planning at the center, optional ML imports only inside execution paths.</text>

  <rect class="box core" x="420" y="112" width="280" height="86" />
  <text class="label" x="468" y="148">compression_demo.cli</text>
  <text class="small" x="458" y="174">argparse plus command handlers</text>

  <rect class="box data" x="70" y="250" width="230" height="92" />
  <text class="label" x="116" y="286">catalog</text>
  <text class="small" x="96" y="313">schemes, algorithms, GPUs</text>

  <rect class="box data" x="70" y="395" width="230" height="92" />
  <text class="label" x="104" y="431">model_specs</text>
  <text class="small" x="93" y="458">presets and HF config parser</text>

  <rect class="box core" x="430" y="292" width="260" height="92" />
  <text class="label" x="498" y="328">planner</text>
  <text class="small" x="466" y="355">memory estimates and choices</text>

  <rect class="box core" x="430" y="455" width="260" height="92" />
  <text class="label" x="492" y="491">benchmarks</text>
  <text class="small" x="462" y="518">vLLM command plan builder</text>

  <rect class="box exec" x="820" y="195" width="230" height="92" />
  <text class="label" x="884" y="231">recipes</text>
  <text class="small" x="850" y="258">snippets and quantization runs</text>

  <rect class="box exec" x="820" y="345" width="230" height="92" />
  <text class="label" x="893" y="381">evals</text>
  <text class="small" x="846" y="408">quality gates and lm_eval</text>

  <rect class="box exec" x="820" y="495" width="230" height="92" />
  <text class="label" x="852" y="531">gpu_benchmarks</text>
  <text class="small" x="849" y="558">CUDA runs and HTML reports</text>

  <path class="edge" d="M 560 198 L 560 286" />
  <path class="edge" d="M 300 296 L 424 328" />
  <path class="edge" d="M 300 442 L 424 358" />
  <path class="edge" d="M 690 336 L 814 244" />
  <path class="edge" d="M 690 360 L 814 388" />
  <path class="edge" d="M 690 501 L 814 538" />
  <path class="edge" d="M 560 198 C 560 232 826 164 908 193" />
  <path class="edge" d="M 560 384 L 560 449" />

  <rect class="note" x="70" y="570" width="980" height="52" rx="8" />
  <text class="small" x="96" y="602">Quality rule: top-level modules stay importable without GPU stacks; heavy packages load only when execution commands need them.</text>
</svg>